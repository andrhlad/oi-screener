<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto World Dashboard — Full Version</title>
    <style>
        :root {
            --bg: #0f111a;
            --card-bg: #1e2134;
            --border: #2c2f4a;
            --text-main: #f1f1f1;
            --text-muted: #a0a3b8;
            --green: #00ff96;
            --red: #ff5c5c;
            --radius: 12px;
            --shadow: 0 6px 16px rgba(0,0,0,0.4);
            --accent: #7f5af0;
        }
        [data-theme="light"] {
            --bg: #f7f7f9;
            --card-bg: #ffffff;
            --border: #e4e6ef;
            --text-main: #222;
            --text-muted: #8f95a3;
            --green: #16a34a;
            --red: #dc2626;
            --accent: #4f46e5;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:"Inter",sans-serif; }
        body { background: var(--bg); color: var(--text-main); transition: 0.3s; overflow-x: hidden; }
        
        .header { background: var(--card-bg); border-bottom:1px solid var(--border); padding: 12px 24px; position: sticky; top:0; z-index:100; }
        .header-inner { max-width:1600px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
        .logo { font-weight:800; font-size:20px; color:var(--accent); text-decoration: none; }

        /* Сітка на 3 колонки */
        .dashboard { display:grid; grid-template-columns: 350px 1fr 350px; max-width:1600px; margin:20px auto; padding:0 20px; gap:20px; }
        .column { display: flex; flex-direction: column; gap: 20px; }
        
        .card { background: var(--card-bg); border-radius: var(--radius); border:1px solid var(--border); padding:16px; display: flex; flex-direction: column; }
        .card-title { font-size:11px; font-weight:700; margin-bottom:12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .chat-container { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 5px; }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* Елементи списків */
        .row-item { display: grid; grid-template-columns: 1.2fr 1fr 1fr; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.02); margin-bottom: 2px; align-items: center; font-size: 13px; }
        .sym-col { font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .val-col { text-align: right; font-variant-numeric: tabular-nums; }
        .change-col { text-align: right; }
        
        .up { color: var(--green); }
        .down { color: var(--red); }
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; }
        .badge-up { background: rgba(0, 255, 150, 0.1); color: var(--green); }
        .badge-down { background: rgba(255, 92, 92, 0.1); color: var(--red); }

        .ex-icon { width: 16px; height: 16px; border-radius: 2px; }

        /* Адаптивність */
        @media(max-width:1200px) { .dashboard { grid-template-columns: 1fr 1fr; } }
        @media(max-width:800px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="#" class="logo">CRYPTO WORLD</a>
        <div style="display:flex; gap:20px; align-items:center;">
            <div id="ws-status" style="font-size:11px; font-weight:bold; color:orange;">WS: CONNECTING</div>
            <button onclick="toggleTheme()" style="cursor:pointer; background:none; border:none; font-size:20px;">🌓</button>
        </div>
    </div>
</header>

<main class="dashboard">
    <div class="column">
        <div class="card">
            <div class="card-title">🔥 Top Gainers (24h)</div>
            <div id="gainers-list"></div>
        </div>
        <div class="card">
            <div class="card-title">❄️ Top Losers (24h)</div>
            <div id="losers-list"></div>
        </div>
        <div class="card">
            <div class="card-title">📰 News Live</div>
            <div id="news-container" class="chat-container" style="height: 250px;">
                <div style="font-size:12px; color:var(--text-muted); padding:10px;">Waiting for news...</div>
            </div>
        </div>
    </div>

    <div class="column">
        <div class="card">
            <div class="card-title">💀 Liquidations Live</div>
            <div id="liq-chat" class="chat-container" style="height: 500px;"></div>
        </div>
        <div class="card">
            <div class="card-title">🚀 Pump & Dump Alerts</div>
            <div id="pump-chat" class="chat-container" style="height: 250px;">
                <div style="font-size:12px; color:var(--text-muted); padding:10px;">Monitoring price spikes...</div>
            </div>
        </div>
    </div>

    <div class="column">
        <div class="card">
            <div class="card-title">📊 Open Interest Chat</div>
            <div id="oi-chat" class="chat-container" style="height: 400px;">
                <div style="font-size:12px; color:var(--text-muted); padding:10px;">Connecting to OI stream...</div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">💬 Admin Support</div>
            <p style="font-size:13px; margin-bottom:10px;">Маєте питання або пропозиції?</p>
            <a href="https://t.me/crypto_world_admin" target="_blank" style="color:var(--accent); font-size:13px; font-weight:700; text-decoration:none;">✈️ Telegram: @crypto_world_admin</a>
        </div>
    </div>
</main>

<script>
    const WS_URL = "ws://127.0.0.1:8000/ws/liquidations";
    
    // Елементи
    const elements = {
        liq: document.getElementById('liq-chat'),
        gainers: document.getElementById('gainers-list'),
        losers: document.getElementById('losers-list'),
        pump: document.getElementById('pump-chat'),
        oi: document.getElementById('oi-chat'),
        status: document.getElementById('ws-status')
    };

    function toggleTheme() {
        const doc = document.documentElement;
        doc.setAttribute('data-theme', doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function getIcon(ex) {
        return ex.toLowerCase() === 'binance' 
            ? '<img class="ex-icon" src="https://bin.bnbstatic.com/static/images/common/favicon.ico">' 
            : '<img class="ex-icon" src="https://www.bybit.com/favicon.ico">';
    }

    // Рендер ліквідацій
    function createLiqRow(d) {
        const div = document.createElement('div');
        div.className = 'row-item';
        div.style.borderLeft = `3px solid ${d.clr === 'green' ? 'var(--green)' : 'var(--red)'}`;
        div.innerHTML = `
            <div class="sym-col">${getIcon(d.ex)} ${d.sym}</div>
            <div class="val-col">${d.prc}</div>
            <div class="change-col"><span class="badge ${d.clr === 'green' ? 'badge-up' : 'badge-down'}">${d.side} ${d.val}</span></div>
        `;
        return div;
    }

    // Рендер лідерів
    function renderLeaders(data, container) {
        container.innerHTML = '';
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'row-item';
            const isPos = item.c >= 0;
            div.innerHTML = `
                <div class="sym-col">${getIcon(item.ex)} ${item.sym}</div>
                <div class="val-col">$${item.p.toFixed(item.p < 1 ? 4 : 2)}</div>
                <div class="change-col ${isPos ? 'up' : 'down'}">${isPos ? '+' : ''}${item.c.toFixed(2)}%</div>
            `;
            container.appendChild(div);
        });
    }

    function connect() {
        const socket = new WebSocket(WS_URL);

        socket.onopen = () => {
            elements.status.textContent = "WS: LIVE";
            elements.status.style.color = "var(--green)";
        };

        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);

            // 1. Історія ліквідацій
            if (msg.type === 'history') {
                elements.liq.innerHTML = '';
                msg.data.forEach(d => elements.liq.prepend(createLiqRow(d)));
            } 
            // 2. Нова ліквідація
            else if (msg.type === 'new') {
                elements.liq.prepend(createLiqRow(msg.data));
                if (elements.liq.children.length > 50) elements.liq.removeChild(elements.liq.lastChild);
            } 
            // 3. Лідери (Gainers/Losers)
            else if (msg.type === 'leaders') {
                renderLeaders(msg.data.gainers, elements.gainers);
                renderLeaders(msg.data.losers, elements.losers);
            }
            // 4. Пампи (готуємо на майбутнє)
            else if (msg.type === 'pump') {
                const div = document.createElement('div');
                div.className = 'row-item';
                div.innerHTML = `<b>🚀 PUMP:</b> ${msg.data.sym} +${msg.data.change}%`;
                elements.pump.prepend(div);
            }
        };

        socket.onclose = () => {
            elements.status.textContent = "WS: RECONNECTING";
            elements.status.style.color = "orange";
            setTimeout(connect, 2000);
        };
    }

    connect();
</script>

</body>
</html>
