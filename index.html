<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto World | Cyber Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05070a;
  --card-bg: rgba(13, 17, 23, 0.85);
  --accent: #00d2ff;
  --border: rgba(0, 210, 255, 0.25);
  --text-main: #e6edf3;
  --text-muted: #7d8590;
  --green: #00ffa3;
  --red: #ff3e3e;
  --glow: 0 0 15px rgba(0, 210, 255, 0.15);
}

[data-theme="light"] {
  --bg: #e0e5ec;
  --card-bg: rgba(255, 255, 255, 0.8);
  --accent: #4f46e5;
  --border: rgba(79, 70, 229, 0.2);
  --text-main: #1a1f2e;
  --text-muted: #64748b;
  --glow: 0 0 15px rgba(79, 70, 229, 0.1);
}

/* --- СКРОЛЛБАР --- */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(13, 17, 23, 0.5); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; box-shadow: 0 0 10px var(--accent); }
::-webkit-scrollbar-thumb:hover { background: #fff; }

* { margin:0; padding:0; box-sizing:border-box; transition: background 0.3s, border-color 0.3s, box-shadow 0.3s; }

body { 
  background: var(--bg); 
  color: var(--text-main); 
  font-family: 'Plus Jakarta Sans', sans-serif;
  background-image: radial-gradient(circle at 50% 50%, #0d1117 0%, var(--bg) 100%);
  min-height: 100vh;
  overflow-x: hidden;
}

[data-theme="light"] body { background-image: radial-gradient(circle at 50% 50%, #f0f2f5 0%, #e0e5ec 100%); }

.cyber-card {
  background: var(--card-bg);
  position: relative;
  border: 1px solid var(--border);
  box-shadow: var(--glow);
  clip-path: polygon(0% 12px, 12px 0%, calc(100% - 12px) 0%, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0% calc(100% - 12px));
  display: flex;
  flex-direction: column;
}

.cyber-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--accent) 0%, transparent 10%, transparent 90%, var(--accent) 100%);
  opacity: 0.15;
  pointer-events: none;
}

.card-inner { padding: 16px; display: flex; flex-direction: column; height: 100%; }

/* --- ОНОВЛЕНІ ЗАГОЛОВКИ (ЦЕНТРУВАННЯ) --- */
.card-title { 
  font-size: 10px; 
  font-weight: 800; 
  margin-bottom: 15px; 
  text-transform: uppercase; 
  color: var(--accent); 
  letter-spacing: 1.5px; 
  text-align: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  width: 90%;
  margin-left: auto;
  margin-right: auto;
}

.header { background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:100; }
[data-theme="light"] .header { background: rgba(224, 229, 236, 0.8); }
.header-inner { max-width: 1600px; margin: 0 auto; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-weight: 800; font-size: 20px; color: var(--accent); text-shadow: 0 0 10px var(--accent); }

.dashboard { 
  display: grid; grid-template-columns: 350px 1fr 320px; 
  max-width: 1600px; margin: 20px auto; padding: 0 20px 40px; gap: 20px; 
}

.chat-container { 
  overflow-y:auto; display:flex; flex-direction:column; gap:2px; flex-grow: 1; 
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
}

.liq-row, .leader-row { 
  display: grid; align-items: center; 
  padding: 8px 4px; border-bottom: 1px solid rgba(128,128,128,0.1); 
}
.liq-row { grid-template-columns: 1.6fr 1.2fr 1fr; }
.leader-row { grid-template-columns: 1.2fr 1fr 1.2fr; }

.liq-symbol, .coin-link { font-weight: 700; color: var(--text-main); text-decoration: none; }
.liq-time { color: var(--text-muted); font-size: 10px; margin-right: 8px; }
.liq-val-text { font-weight: 700; }
.liq-price { text-align: right; font-variant-numeric: tabular-nums; }

.change-badge { font-weight: 700; font-size: 11px; padding: 3px 6px; border-radius: 4px; text-align: center; min-width: 60px; }
.change-badge.up { background: rgba(0, 255, 150, 0.1); color: var(--green); border: 1px solid rgba(0, 255, 150, 0.2); }
.change-badge.down { background: rgba(255, 92, 92, 0.1); color: var(--red); border: 1px solid rgba(255, 92, 92, 0.2); }

.ex-icon { width: 14px; height: 14px; border-radius: 2px; vertical-align: middle; margin: 0 4px; }
.clock-box { font-family: 'JetBrains Mono'; background: rgba(0,0,0,0.1); padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border); font-size: 13px; }

@media(max-width:1200px){ .dashboard { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">CRYPTO WORLD</div>
    <div style="display: flex; gap: 15px; align-items: center;">
      <div class="clock-box">UTC: <span id="clock-utc">00:00:00</span></div>
      <button id="theme-btn" style="background:none; border:none; cursor:pointer; font-size:18px;">🌓</button>
    </div>
  </div>
</header>

<main class="dashboard">
  <div style="display: flex; flex-direction: column; gap: 20px;">
    <div class="cyber-card" style="height:450px"><div class="card-inner">
      <div class="card-title">Pump & Dump </div><div id="pump-chat" class="chat-container"></div>
    </div></div>
    <div class="cyber-card" style="height:180px"><div class="card-inner">
      <div class="card-title">News </div><div id="news-container" class="chat-container"></div>
    </div></div>
    <div class="cyber-card" style="height:550px"><div class="card-inner">
      <div class="card-title">Listings / Delistings</div><div id="listings-container" class="chat-container"></div>
    </div></div>
  </div>

  <div style="display: flex; flex-direction: column; gap: 20px;">
    <div class="cyber-card" style="height:600px"><div class="card-inner">
      <div class="card-title">Open Interest</div><div id="oi-chat" class="chat-container"></div>
    </div></div>
    <div class="cyber-card" style="height:580px"><div class="card-inner">
      <div class="card-title">Liquidations Live </div><div id="liquidations-chat" class="chat-container"></div>
    </div></div>
  </div>

  <div style="display: flex; flex-direction: column; gap: 20px;">
    <div class="cyber-card" style="height:450px"><div class="card-inner">
      <div class="card-title">Top Gainers</div><div id="gainers-list" style="display:flex; flex-direction:column; justify-content:space-around; flex-grow:1;"></div>
    </div></div>
    <div class="cyber-card" style="height:450px"><div class="card-inner">
      <div class="card-title">Top Losers</div><div id="losers-list" style="display:flex; flex-direction:column; justify-content:space-around; flex-grow:1;"></div>
    </div></div>
    <div class="cyber-card" style="margin-top: auto;"><div class="card-inner">
      <div class="card-title">Info</div>
      <div style="font-size:11px; text-align: center; color:var(--text-muted); line-height:1.5;">Status: Connected<br>Latency: 24ms</div>
      <a href="https://t.me/crypto_world_admin" target="_blank" style="color:var(--accent); text-decoration:none; text-align:center; font-size:12px; font-weight:700; margin-top:10px; display:block;">✈️ Telegram: @crypto_world_admin</a>
    </div></div>
  </div>
</main>

<script>
const LEADERS_API = "http://127.0.0.1:5000"; 
const LIQ_WS_URL = "ws://127.0.0.1:8000/ws/liquidations"; 
const REF_LINKS = { binance: "https://accounts.binance.com/register?ref=184649565", bybit: "https://www.bybit.com/invite?ref=J8QWYL%230" };

const themeBtn = document.getElementById('theme-btn');
themeBtn.onclick = () => {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  const newTheme = currentTheme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', newTheme);
  themeBtn.textContent = newTheme === 'light' ? '☀️' : '🌓';
};

setInterval(() => { 
  document.getElementById('clock-utc').textContent = new Date().toLocaleTimeString('en-GB',{timeZone:'UTC'}); 
}, 1000);

function getIconsHtml(ex, symbol, split = false) {
  const name = ex.toLowerCase();
  const exIcon = name === "binance" ? "https://bin.bnbstatic.com/static/images/common/favicon.ico" : "https://www.bybit.com/favicon.ico";
  const cgIcon = "https://www.google.com/s2/favicons?sz=32&domain=coinglass.com";
  const exF = ex.charAt(0).toUpperCase() + ex.slice(1).toLowerCase();
  const cgTvUrl = `https://www.coinglass.com/tv/ru/${exF}_${symbol}USDT`;
  const exHtml = `<a href="${REF_LINKS[name]||'#'}" target="_blank"><img src="${exIcon}" class="ex-icon"></a>`;
  const cgHtml = `<a href="${cgTvUrl}" target="_blank"><img src="${cgIcon}" class="ex-icon"></a>`;
  return split ? { exHtml, cgHtml } : exHtml + cgHtml;
}

function renderLeaders(containerId, items, colorClass) {
  const el = document.getElementById(containerId);
  if (!items) return;
  el.innerHTML = items.slice(0, 10).map(i => {
    const tradeUrl = i.exchange === "binance" ? `https://www.binance.com/en/futures/${i.symbol}USDT` : `https://www.bybit.com/trade/usdt/${i.symbol}USDT`;
    const icons = getIconsHtml(i.exchange, i.symbol, true);
    return `
    <div class="leader-row">
      <div style="display:flex; align-items:center;">
        ${icons.exHtml}
        <a href="${tradeUrl}" target="_blank" class="coin-link">${i.symbol}</a>
      </div>
      <div class="liq-price">${i.price}</div>
      <div style="display:flex; align-items:center; justify-content:flex-end; gap:8px;">
        <div class="change-badge ${colorClass}">${i.change >= 0 ? '+' : ''}${i.change}%</div>
        ${icons.cgHtml}
      </div>
    </div>`;
  }).join('');
}

function setupLeadersSSE() {
  const source = new EventSource(`${LEADERS_API}/leaders_stream`);
  source.onmessage = e => {
    const data = JSON.parse(e.data);
    renderLeaders('gainers-list', data.gainers, 'up');
    renderLeaders('losers-list', data.losers, 'down');
  };
}

function addLiquidationToUI(data) {
    const container = document.getElementById('liquidations-chat');
    const row = document.createElement('div');
    row.className = 'liq-row';
    const sideColor = data.side === "SHORT" ? "var(--green)" : "var(--red)";
    const exIcon = data.ex.toLowerCase() === "binance" ? "https://bin.bnbstatic.com/static/images/common/favicon.ico" : "https://www.bybit.com/favicon.ico";
    const refUrl = REF_LINKS[data.ex.toLowerCase()] || '#';
    row.innerHTML = `
        <div style="display:flex; align-items:center;">
            <span class="liq-time">${data.tm}</span>
            <a href="${refUrl}" target="_blank"><img src="${exIcon}" class="ex-icon"></a>
            <span class="liq-symbol">${data.sym}</span>
        </div>
        <div>
            <span style="color: ${sideColor}; font-weight:800; font-size:10px;">${data.side}</span>
            <span class="liq-val-text">${data.val}</span>
        </div>
        <div class="liq-price">${data.prc}</div>
    `;
    container.insertBefore(row, container.firstChild);
    if (container.children.length > 5000) container.lastElementChild.remove();
}

function setupLiquidationsWS() {
    const socket = new WebSocket(LIQ_WS_URL);
    socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'history') {
            document.getElementById('liquidations-chat').innerHTML = '';
            [...msg.data].forEach(item => addLiquidationToUI(item));
        } else if (msg.type === 'new') { 
            addLiquidationToUI(msg.data); 
        }
    };
    socket.onclose = () => setTimeout(setupLiquidationsWS, 3000);
}

window.onload = () => { 
  setupLeadersSSE(); 
  setupLiquidationsWS(); 
};
</script>
</body>
</html>
