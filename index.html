<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Interest Screener — Crypto World Dashboard</title>
  <meta name="description" content="Real-time crypto market monitoring.">
  <style>
    :root {
      --bg: #0f111a;
      --card-bg: #1e2134;
      --border: #2c2f4a;
      --text-main: #f1f1f1;
      --text-muted: #a0a3b8;
      --green: #00ff96;
      --red: #ff5c5c;
      --radius: 12px;
      --shadow: 0 6px 16px rgba(0,0,0,0.4);
      --accent: #7f5af0;
    }
    [data-theme="light"] {
      --bg: #f7f7f9;
      --card-bg: #ffffff;
      --border: #e4e6ef;
      --text-main: #222;
      --text-muted: #8f95a3;
      --green: #16a34a;
      --red: #dc2626;
      --shadow: 0 8px 20px rgba(15,23,42,0.06);
      --accent: #4f46e5;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:"Inter",sans-serif; transition: background 0.3s, color 0.3s; }
    body { background: var(--bg); color: var(--text-main); min-height:100vh; }

    /* HEADER */
    .header { background: var(--card-bg); border-bottom:1px solid var(--border); position: sticky; top:0; z-index:100; }
    .header-inner { max-width:1440px; margin:0 auto; padding:12px 24px; display:flex; justify-content:space-between; align-items:center; }
    .logo { font-weight:800; font-size:20px; color:var(--accent); letter-spacing: 1px; }
    .header-right { display:flex; align-items:center; gap:12px; }
    .clock-box { background: var(--bg); padding:6px 14px; border-radius:999px; font-size:13px; border:1px solid var(--border); font-variant-numeric: tabular-nums; }
    .theme-toggle { width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:18px; display: flex; align-items: center; justify-content: center; }

    /* DASHBOARD */
    .dashboard { display:grid; grid-template-columns:350px 1fr 320px; max-width:1440px; margin:20px auto; padding:0 20px 40px; gap:20px; }
    .column { display:flex; flex-direction:column; gap:20px; }
    .card { background: var(--card-bg); border-radius: var(--radius); border:1px solid var(--border); box-shadow: var(--shadow); padding:16px; display:flex; flex-direction:column; }
    .card-title { font-size:13px; font-weight:700; margin-bottom:12px; text-transform:uppercase; color: var(--text-muted); letter-spacing: 0.5px; }

    .chat-container { overflow-y:auto; display:flex; flex-direction:column; gap:6px; scroll-behavior:smooth; }

    /* ROW STYLES */
    .leader-row { display:grid; grid-template-columns: 1.1fr 1fr 1.3fr; padding:8px; border-radius:6px; align-items:center; margin-bottom: 2px; }
    .leader-row:hover { background: rgba(127,90,240,0.05); }
    .leader-symbol { display: flex; align-items: center; gap: 8px; font-weight: 600; }
    .ex-icon { width: 16px; height: 16px; border-radius: 3px; }
    .leader-price { text-align:right; font-variant-numeric: tabular-nums; font-weight: 600; font-size: 12px; }
    .leader-price.up { color: var(--green); }
    .leader-price.down { color: var(--red); }
    .change-badge { display: inline-flex; align-items: center; justify-content: center; padding: 4px 10px; border-radius: 999px; font-weight: 700; min-width: 65px; font-size: 11px; }
    .change-badge.up { background: rgba(0, 255, 150, 0.15); color: var(--green); }
    .change-badge.down { background: rgba(255, 92, 92, 0.15); color: var(--red); }
    .leader-change { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }

    .contact-link { color: var(--accent); text-decoration:none; font-weight:600; margin-top:5px; font-size:13px; display: block; }

    @media(max-width:1100px){.dashboard{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">CRYPTO WORLD</div>
    <div class="header-right">
      <div id="ws-status" style="font-size: 10px; color: var(--text-muted);">WS: OFF</div>
      <div class="clock-box">UTC: <span id="clock-utc">00:00:00</span></div>
      <button id="theme-btn" class="theme-toggle">🌓</button>
    </div>
  </div>
</header>

<main class="dashboard">
  <div class="column">
    <div class="card"><div class="card-title">News Live</div><div id="news-container" class="chat-container" style="height:180px"></div></div>
    <div class="card"><div class="card-title">Listings / Delistings</div><div id="listings-container" class="chat-container" style="height:180px"></div></div>
    <div class="card"><div class="card-title">Pump & Dump Live</div><div id="pump-chat" class="chat-container" style="height:500px"></div></div>
  </div>

  <div class="column">
    <div class="card"><div class="card-title">Open Interest Chat</div><div id="oi-chat" class="chat-container" style="height:300px"></div></div>
    <div class="card" style="flex-grow:1;">
        <div class="card-title">Liquidations Live</div>
        <div id="liquidations-chat" class="chat-container" style="height:100%; min-height:400px;">
            <div style="color:var(--text-muted); padding:20px; font-size:12px;">Connecting to data stream...</div>
        </div>
    </div>
  </div>

  <div class="column">
    <div class="card"><div class="card-title">Top Gainers (24h)</div><div id="gainers-list"></div></div>
    <div class="card"><div class="card-title">Top Losers (24h)</div><div id="losers-list"></div></div>
    <div class="card">
      <div class="card-title">Contacts</div>
      <a href="mailto:support@cryptoworld.com" class="contact-link">📧 support@cryptoworld.com</a>
      <a href="https://t.me/crypto_world_admin" target="_blank" class="contact-link">✈️ Telegram: @crypto_world_admin</a>
    </div>
  </div>
</main>

<script>
const WS_URL = "ws://127.0.0.1:8000/ws/liquidations";
const API_URL = "http://127.0.0.1:8000"; // Змінено на 8000 для уніфікації

// 1. Theme & Clock
const themeBtn = document.getElementById('theme-btn');
themeBtn.onclick = () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  themeBtn.textContent = isDark ? '🌓' : '☀️';
};
setInterval(() => { 
  document.getElementById('clock-utc').textContent = new Date().toLocaleTimeString('en-US', {timeZone:'UTC', hour12: false}); 
}, 1000);

// 2. Helpers
function getExchangeIcon(ex) {
  const icon = ex.toLowerCase() === "binance" ? "https://bin.bnbstatic.com/static/images/common/favicon.ico" : "https://www.bybit.com/favicon.ico";
  return `<img src="${icon}" class="ex-icon">`;
}

function createRow(data, type='liq') {
    const isUp = data.clr !== 'red';
    const row = document.createElement('div');
    row.className = 'leader-row';
    row.style.background = 'rgba(255,255,255,0.02)';
    row.style.borderLeft = `3px solid ${isUp ? 'var(--green)' : 'var(--red)'}`;
    
    row.innerHTML = `
        <div class="leader-symbol">${getExchangeIcon(data.ex)} <span>${data.sym}</span></div>
        <div class="leader-price ${isUp ? 'up' : 'down'}">${data.tm}<br>${data.prc}</div>
        <div class="leader-change">
            <div class="change-badge ${isUp ? 'up' : 'down'}">${data.side} $${data.val}</div>
        </div>
    `;
    return row;
}

// 3. WebSocket Connection (Liquidations)
const liqChat = document.getElementById('liquidations-chat');
const wsStatus = document.getElementById('ws-status');

function connectWS() {
    const socket = new WebSocket(WS_URL);

    socket.onopen = () => {
        wsStatus.textContent = "WS: LIVE";
        wsStatus.style.color = "var(--green)";
    };

    socket.onmessage = (event) => {
        const res = JSON.parse(event.data);
        
        if (res.type === 'history') {
            liqChat.innerHTML = '';
            res.data.forEach(item => liqChat.prepend(createRow(item)));
        } else if (res.type === 'new') {
            liqChat.prepend(createRow(res.data));
            if (liqChat.children.length > 50) liqChat.removeChild(liqChat.lastChild);
        }
    };

    socket.onclose = () => {
        wsStatus.textContent = "WS: RECONNECTING";
        wsStatus.style.color = "var(--red)";
        setTimeout(connectWS, 3000);
    };
}

// 4. Leaders (SSE or Polling)
async function updateLeaders() {
    try {
        // Тут може бути або SSE, або звичайний fetch
        const r = await fetch(`${API_URL}/leaders`);
        const data = await r.json();
        // Рендер гайнерів/лузерів аналогічно вашому коду
    } catch(e) {}
}

window.onload = () => {
    connectWS();
    // updateLeaders(); // Розкоментувати, коли бекенд буде готовий
};
</script>
</body>
</html>
