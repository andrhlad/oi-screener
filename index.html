<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto World Dashboard Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e11; /* Глибокий темний (як у Binance) */
  --card-bg: rgba(30, 33, 52, 0.7);
  --border: rgba(255, 255, 255, 0.08);
  --text-main: #f1f1f1;
  --text-muted: #848e9c;
  --green: #00ff96;
  --red: #ff5c5c;
  --radius: 16px;
  --accent: #4f46e5;
  --shadow: 0 12px 40px rgba(0,0,0,0.6);
}

[data-theme="light"] {
  --bg: #f0f2f5;
  --card-bg: rgba(255, 255, 255, 0.8);
  --border: rgba(0, 0, 0, 0.05);
  --text-main: #1e2329;
  --text-muted: #707a8a;
  --green: #03a66d;
  --red: #cf304a;
  --accent: #4f46e5;
  --shadow: 0 8px 30px rgba(0,0,0,0.05);
}

* { margin:0; padding:0; box-sizing:border-box; font-family:"Inter", sans-serif; transition: background 0.3s, border-color 0.3s; }

body { 
  background: var(--bg); 
  color: var(--text-main); 
  min-height: 100vh;
  /* Додаємо легкий градієнт на фоні для глибини */
  background-image: radial-gradient(circle at 50% -20%, #1e2134 0%, var(--bg) 80%);
}

/* HEADER */
.header { 
  background: var(--card-bg); 
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); 
  position: sticky; top:0; z-index:100; 
}
.header-inner { max-width:1440px; margin:0 auto; padding:10px 24px; display:flex; justify-content:space-between; align-items:center; }
.logo { font-weight:800; font-size:22px; color: var(--text-main); letter-spacing: -1px; }
.logo span { color: var(--accent); }

.status-box { display: flex; align-items: center; gap: 15px; }
.status-indicator {
  width: 8px; height: 8px; background: var(--green); border-radius: 50%;
  box-shadow: 0 0 10px var(--green);
}
.clock-box { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text-muted); }

/* CARDS & GRID */
.dashboard { 
  display: grid; grid-template-columns: 350px 1fr 320px; 
  max-width: 1440px; margin: 20px auto; padding: 0 20px; gap: 20px; 
}
.column { display: flex; flex-direction: column; gap: 20px; }

.card { 
  background: var(--card-bg); 
  backdrop-filter: blur(10px);
  border-radius: var(--radius); 
  border: 1px solid var(--border); 
  box-shadow: var(--shadow); 
  padding: 20px; 
  display: flex; flex-direction: column;
  transition: transform 0.2s ease, border-color 0.2s ease;
}
.card:hover { transform: translateY(-4px); border-color: rgba(79, 70, 229, 0.4); }

.card-title { 
  font-size: 11px; font-weight: 800; margin-bottom: 18px; 
  text-transform: uppercase; color: var(--text-muted); letter-spacing: 1.2px;
  display: flex; justify-content: space-between;
}

/* LISTS & CHATS */
.chat-container { overflow-y:auto; display:flex; flex-direction:column; gap:4px; flex-grow: 1; }
.chat-container::-webkit-scrollbar { width: 4px; }
.chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

/* LIQUIDATIONS ANIMATION */
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

.liq-row { 
  display: grid; grid-template-columns: 1.5fr 1fr 1fr; 
  padding: 10px; border-bottom: 1px solid var(--border); 
  font-size: 13px; animation: slideIn 0.3s ease-out forwards;
}
.liq-symbol { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
.liq-price { font-family: 'JetBrains Mono', monospace; text-align: right; color: var(--text-muted); }
.liq-val-text { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text-main); }

/* LEADERS STYLE */
.leader-row { 
  display: grid; grid-template-columns: 1fr 1fr 1fr; 
  padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center; 
}
.leader-price { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
.change-badge { 
  font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px; 
  padding: 4px 8px; border-radius: 6px; text-align: center;
}
.change-badge.up { background: rgba(0, 255, 150, 0.1); color: var(--green); border: 1px solid rgba(0, 255, 150, 0.2); }
.change-badge.down { background: rgba(255, 92, 92, 0.1); color: var(--red); border: 1px solid rgba(255, 92, 92, 0.2); }

.ex-icon { width: 16px; height: 16px; border-radius: 4px; vertical-align: middle; margin-right: 8px; }

@media(max-width:1100px){ .dashboard { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">CRYPTO<span>WORLD</span></div>
    <div class="status-box">
      <div class="clock-box" id="clock-utc">00:00:00 UTC</div>
      <div class="status-indicator" title="Connection Active"></div>
      <button id="theme-btn" style="background:none; border:none; cursor:pointer; font-size:18px;">🌓</button>
    </div>
  </div>
</header>

<main class="dashboard">
  <div class="column">
    <div class="card" style="height:450px"><div class="card-title"><span>Pump & Dump</span><span style="color:var(--green)">Live</span></div><div id="pump-chat" class="chat-container"></div></div>
    <div class="card" style="height:200px"><div class="card-title">News Feed</div><div id="news-container" class="chat-container"></div></div>
    <div class="card" style="height:500px"><div class="card-title">Listings</div><div id="listings-container" class="chat-container"></div></div>
  </div>

  <div class="column">
    <div class="card" style="height:600px"><div class="card-title">Open Interest Analysis</div><div id="oi-chat" class="chat-container"></div></div>
    <div class="card" style="height:570px"><div class="card-title">Liquidations <span>24h Heat</span></div><div id="liquidations-chat" class="chat-container"></div></div>
  </div>

  <div class="column">
    <div class="card" style="height:480px">
      <div class="card-title">Top Gainers</div>
      <div id="gainers-list"></div>
    </div>
    <div class="card" style="height:480px">
      <div class="card-title">Top Losers</div>
      <div id="losers-list"></div>
    </div>
    
    <div class="card" style="margin-top: auto;">
      <div class="card-title">Terminal Info</div>
      <div style="font-size:12px; color:var(--text-muted); line-height:1.6;">
        Real-time aggregate data from Binance & Bybit. 
        <a href="https://t.me/crypto_world_admin" target="_blank" style="color:var(--accent); text-decoration:none; display:block; margin-top:10px; font-weight:700;">Join Telegram Community →</a>
      </div>
    </div>
  </div>
</main>

<script>
// Налаштування API
const LEADERS_API = "http://127.0.0.1:5000"; 
const LIQ_WS_URL = "ws://127.0.0.1:8000/ws/liquidations"; 
const REF_LINKS = { binance: "https://accounts.binance.com/register?ref=184649565", bybit: "https://www.bybit.com/invite?ref=J8QWYL%230" };

// Керування темою
const themeBtn = document.getElementById('theme-btn');
themeBtn.onclick = () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
};

// Годинник
setInterval(() => { 
  document.getElementById('clock-utc').textContent = new Date().toLocaleTimeString('en-GB',{timeZone:'UTC'}) + ' UTC'; 
}, 1000);

// Рендер лідерів ринку
function renderLeaders(containerId, items, colorClass) {
  const el = document.getElementById(containerId);
  if (!items) return;
  el.innerHTML = items.slice(0, 8).map(i => {
    const exIcon = i.exchange === "binance" ? "https://bin.bnbstatic.com/static/images/common/favicon.ico" : "https://www.bybit.com/favicon.ico";
    return `
    <div class="leader-row">
      <div style="display:flex; align-items:center;">
        <img src="${exIcon}" class="ex-icon">
        <span style="font-weight:700; font-size:13px;">${i.symbol}</span>
      </div>
      <div class="leader-price">$${i.price}</div>
      <div style="text-align:right">
        <span class="change-badge ${colorClass}">${i.change >= 0 ? '+' : ''}${i.change}%</span>
      </div>
    </div>`;
  }).join('');
}

function setupLeadersSSE() {
  const source = new EventSource(`${LEADERS_API}/leaders_stream`);
  source.onmessage = e => {
    const data = JSON.parse(e.data);
    renderLeaders('gainers-list', data.gainers, 'up');
    renderLeaders('losers-list', data.losers, 'down');
  };
}

// Рендер ліквідацій
function addLiquidationToUI(data) {
    const container = document.getElementById('liquidations-chat');
    const row = document.createElement('div');
    row.className = 'liq-row';
    const sideColor = data.side === "SHORT" ? "var(--green)" : "var(--red)";
    const exIcon = data.ex.toLowerCase() === "binance" ? "https://bin.bnbstatic.com/static/images/common/favicon.ico" : "https://www.bybit.com/favicon.ico";
    
    row.innerHTML = `
        <div style="display:flex; align-items:center;">
            <span style="color:var(--text-muted); font-size:10px; margin-right:8px; font-family:'JetBrains Mono'">${data.tm}</span>
            <img src="${exIcon}" class="ex-icon" style="margin-right:5px">
            <span class="liq-symbol">${data.sym}</span>
        </div>
        <div>
            <span style="color: ${sideColor}; font-weight:800; font-size:11px; margin-right:5px">${data.side}</span>
            <span class="liq-val-text">$${data.val}</span>
        </div>
        <div class="liq-price">${data.prc}</div>
    `;
    container.insertBefore(row, container.firstChild);
    if (container.children.length > 100) container.lastElementChild.remove();
}

function setupLiquidationsWS() {
    const socket = new WebSocket(LIQ_WS_URL);
    const indicator = document.querySelector('.status-indicator');

    socket.onopen = () => indicator.style.background = 'var(--green)';
    socket.onclose = () => indicator.style.background = 'var(--red)';
    
    socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'history') {
            document.getElementById('liquidations-chat').innerHTML = '';
            [...msg.data].reverse().forEach(item => addLiquidationToUI(item));
        } else if (msg.type === 'new') { 
            addLiquidationToUI(msg.data); 
        }
    };
}

window.onload = () => { setupLeadersSSE(); setupLiquidationsWS(); };
</script>
</body>
</html>
