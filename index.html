<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto World Dashboard</title>
<style>
:root {
    --bg: #0f111a;
    --card-bg: #1e2134;
    --border: #2c2f4a;
    --text-main: #f1f1f1;
    --text-muted: #a0a3b8;
    --green: #00ff96;
    --red: #ff5c5c;
    --radius: 12px;
    --shadow: 0 6px 16px rgba(0,0,0,0.4);
    --accent: #7f5af0;
}
[data-theme="light"] {
    --bg: #f7f7f9;
    --card-bg: #ffffff;
    --border: #e4e6ef;
    --text-main: #222;
    --text-muted: #8f95a3;
    --green: #16a34a;
    --red: #dc2626;
    --shadow: 0 8px 20px rgba(15,23,42,0.06);
    --accent: #4f46e5;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:"Inter",system-ui,-apple-system,sans-serif; transition: background 0.3s, color 0.3s; }
body { background: var(--bg); color: var(--text-main); min-height:100vh; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* HEADER */
.header { background: var(--card-bg); border-bottom:1px solid var(--border); position: sticky; top:0; z-index:100; }
.header-inner { max-width:1440px; margin:0 auto; padding:12px 24px; display:flex; justify-content:space-between; align-items:center; }
.logo { font-weight:800; font-size:20px; color:var(--accent); }
.header-right { display:flex; align-items:center; gap:12px; }
.clock-box { background: var(--bg); padding:6px 14px; border-radius:999px; font-size:13px; border:1px solid var(--border); }
.theme-toggle { width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:18px; }

/* GRID */
.dashboard { display:grid; grid-template-columns:350px 1fr 320px; max-width:1440px; margin:20px auto; padding:0 20px 40px; gap:20px; }
.column { display:flex; flex-direction:column; gap:20px; }

.card { background: var(--card-bg); border-radius: var(--radius); border:1px solid var(--border); box-shadow: var(--shadow); padding:16px; display:flex; flex-direction:column; height: fit-content; }
.card-title { font-size:13px; font-weight:700; margin-bottom:12px; text-transform:uppercase; color: var(--text-muted); }

.chat-container { overflow-y:auto; display:flex; flex-direction:column; scroll-behavior:smooth; }

/* --- ОНОВЛЕНИЙ СТИЛЬ ЛІКВІДАЦІЙ --- */
.liq-row {
    display: grid !important;
    grid-template-columns: 1.5fr 1fr 1fr;
    align-items: center;
    padding: 12px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    animation: fadeIn 0.4s ease-out;
}
.liq-info { display: flex; align-items: center; }
.liq-time {
    color: var(--text-muted);
    font-size: 11px;
    margin-right: 25px; /* Велика відстань від часу до назви */
    font-variant-numeric: tabular-nums;
}
.liq-symbol { font-weight: 700; color: var(--text-main); }

.liq-amount { text-align: center; display: flex; flex-direction: column; align-items: center; }
.liq-side-label { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
.liq-val-text { color: var(--text-main); font-weight: 700; font-size: 14px; }
.liq-price { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-main); font-size: 12px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* LEADERS STYLE */
.leaders-content { display:flex; flex-direction:column; gap:6px; font-size:12px; }
.leader-row { display:grid; grid-template-columns: 1.1fr 1fr 1.4fr; padding:8px 8px; border-radius:6px; align-items:center; }
.leader-symbol { display: flex; align-items: center; gap: 8px; font-weight: 600; }
.leader-price { text-align: left; font-variant-numeric: tabular-nums; font-weight: 600; }
.leader-change-wrapper { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
.change-badge { display: inline-flex; align-items: center; justify-content: center; padding: 4px 10px; border-radius: 999px; font-weight: 700; min-width: 65px; }
.change-badge.up { background: rgba(0, 255, 150, 0.15); color: var(--green); }
.change-badge.down { background: rgba(255, 92, 92, 0.15); color: var(--red); }

/* ICONS */
.ex-icon { width: 16px; height: 16px; border-radius: 4px; object-fit: contain; }
.cg-icon-small { width: 14px; height: 14px; opacity: 0.7; transition: 0.2s; }
.cg-icon-small:hover { opacity: 1; }
.coin-link { text-decoration: none; color: inherit; }
.contact-link { color: var(--accent); text-decoration:none; font-weight:600; margin-top:5px; font-size:13px; display: block; }

@media(max-width:1100px){.dashboard{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo">CRYPTO WORLD</div>
        <div class="header-right">
            <div class="clock-box">UTC: <span id="clock-utc">00:00:00</span></div>
            <button id="theme-btn" class="theme-toggle">🌓</button>
        </div>
    </div>
</header>

<main class="dashboard">
    <div class="column">
        <div class="card"><div class="card-title">Pump & Dump Live</div><div id="pump-chat" class="chat-container" style="height:500px"></div></div>
        <div class="card"><div class="card-title">News Live</div><div id="news-container" class="chat-container" style="height:180px"></div></div>
    </div>

    <div class="column">
        <div class="card"><div class="card-title">Open Interest Chat</div><div id="oi-chat" class="chat-container" style="height:250px"></div></div>
        <div class="card">
            <div class="card-title">Liquidations Live</div>
            <div id="liquidations-chat" class="chat-container" style="height:550px;"></div>
        </div>
    </div>

    <div class="column">
        <div class="card">
            <div class="card-title">Top Gainers (24h)</div>
            <div id="gainers-list" class="leaders-content"></div>
        </div>
        <div class="card">
            <div class="card-title">Top Losers (24h)</div>
            <div id="losers-list" class="leaders-content"></div>
        </div>
        <div class="card">
            <div class="card-title">About Us</div>
            <a href="https://t.me/crypto_world_admin" target="_blank" class="contact-link">✈️ Telegram: @crypto_world_admin</a>
        </div>
    </div>
</main>

<script>
const LEADERS_API = "http://127.0.0.1:5000"; 
const LIQ_WS_URL = "ws://127.0.0.1:8000/ws/liquidations"; 
const REF_LINKS = { binance: "https://accounts.binance.com/register?ref=123", bybit: "https://www.bybit.com/invite?ref=ABC" };

// CLOCK & THEME
const themeBtn = document.getElementById('theme-btn');
themeBtn.onclick = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    themeBtn.textContent = isDark ? '🌓' : '☀️';
};
setInterval(() => { document.getElementById('clock-utc').textContent = new Date().toLocaleTimeString('en-GB',{timeZone:'UTC'}); }, 1000);

// LEADERS RENDER
function renderLeaders(containerId, items, forceColorClass) {
    const el = document.getElementById(containerId);
    if (!items) return;
    el.innerHTML = items.map(i => {
        const tradeUrl = i.exchange === "binance" ? `https://www.binance.com/en/futures/${i.symbol}USDT` : `https://www.bybit.com/trade/usdt/${i.symbol}USDT`;
        const exIcon = i.exchange === "binance" ? "https://bin.bnbstatic.com/static/images/common/favicon.ico" : "https://www.bybit.com/favicon.ico";
        const cgIcon = "https://www.google.com/s2/favicons?sz=32&domain=coinglass.com";
        const cgTvUrl = `https://www.coinglass.com/tv/ru/${i.exchange.charAt(0).toUpperCase() + i.exchange.slice(1)}_${i.symbol}USDT`;

        return `
        <div class="leader-row">
            <div class="leader-symbol">
                <img src="${exIcon}" class="ex-icon">
                <a href="${tradeUrl}" target="_blank" class="coin-link">${i.symbol}</a>
            </div>
            <div class="leader-price ${forceColorClass}">$${i.price}</div>
            <div class="leader-change-wrapper">
                <div class="change-badge ${i.change >= 0 ? 'up' : 'down'}">${i.change}%</div>
                <a href="${cgTvUrl}" target="_blank"><img src="${cgIcon}" class="cg-icon-small"></a>
            </div>
        </div>`;
    }).join('');
}

function setupSSE() {
    const source = new EventSource(`${LEADERS_API}/leaders_stream`);
    source.onmessage = e => {
        const data = JSON.parse(e.data);
        renderLeaders('gainers-list', data.gainers, 'up');
        renderLeaders('losers-list', data.losers, 'down');
    };
}

// LIQUIDATIONS RENDER (ОНОВЛЕНО)
function addLiquidationToUI(data) {
    const container = document.getElementById('liquidations-chat');
    const row = document.createElement('div');
    row.className = 'liq-row';

    const sideColor = data.side === "SHORT" ? "var(--green)" : "var(--red)";
    const exIcon = data.ex.toLowerCase() === "binance" ? "https://bin.bnbstatic.com/static/images/common/favicon.ico" : "https://www.bybit.com/favicon.ico";

    row.innerHTML = `
        <div class="liq-info">
            <img src="${exIcon}" class="ex-icon">
            <span class="liq-time">${data.tm}</span>
            <span class="liq-symbol">${data.sym}</span>
        </div>
        <div class="liq-amount">
            <span class="liq-side-label" style="color: ${sideColor};">${data.side}</span>
            <span class="liq-val-text">$${data.val}</span>
        </div>
        <div class="liq-price">$${data.prc}</div>
    `;
    container.insertBefore(row, container.firstChild);
    if (container.children.length > 40) container.lastElementChild.remove();
}

function setupWS() {
    const socket = new WebSocket(LIQ_WS_URL);
    socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'history') {
            document.getElementById('liquidations-chat').innerHTML = '';
            msg.data.forEach(item => addLiquidationToUI(item));
        } else if (msg.type === 'new') { addLiquidationToUI(msg.data); }
    };
}

window.onload = () => { setupSSE(); setupWS(); };
</script>
</body>
</html>
