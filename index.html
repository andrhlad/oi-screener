<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto World Dashboard</title>

<style>
:root {
  --bg: #0f111a;
  --card-bg: #1e2134;
  --border: #2c2f4a;
  --text-main: #f1f1f1;
  --text-muted: #a0a3b8;
  --green: #00ff96;
  --red: #ff5c5c;
  --radius: 12px;
  --shadow: 0 6px 16px rgba(0,0,0,0.4);
  --accent: #7f5af0;
}

[data-theme="light"] {
  --bg: #f7f7f9;
  --card-bg: #ffffff;
  --border: #e4e6ef;
  --text-main: #222;
  --text-muted: #8f95a3;
  --green: #16a34a;
  --red: #dc2626;
  --shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
  --accent: #4f46e5;
}

* {
  margin:0; padding:0; box-sizing:border-box;
  font-family: "Inter", system-ui, -apple-system, sans-serif;
}

body { background: var(--bg); color: var(--text-main); }

/* HEADER */
.header {
  background: var(--card-bg);
  border-bottom:1px solid var(--border);
  position: sticky; top:0; z-index:100;
}
.header-inner {
  max-width: 1440px; margin:0 auto; padding:12px 24px;
  display:flex; justify-content:space-between; align-items:center;
}
.logo { font-weight:800; font-size:20px; color:var(--accent); }

/* DASHBOARD */
.dashboard {
  display:grid; grid-template-columns:350px 1fr 320px;
  max-width:1440px; margin:20px auto; padding:0 20px 40px; gap:20px;
}
.column { display:flex; flex-direction:column; gap:20px; }

.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  border:1px solid var(--border);
  box-shadow: var(--shadow);
  padding:16px;
}
.card-title {
  font-size:13px; font-weight:700;
  margin-bottom:12px; text-transform:uppercase;
  color: var(--text-muted);
}

/* LEADERS */
.leaders-content { display:flex; flex-direction:column; gap:6px; font-size:12px; }
.leader-row {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  padding:6px 8px;
  border-radius:6px;
  align-items:center;
}
.leader-symbol {
  display:flex;
  align-items:center;
  gap:6px;
}
.leader-symbol img {
  width:14px;
  height:14px;
}
.leader-price {
  text-align:right;
  color: var(--text-muted);
}
.leader-change.up { color: var(--green); text-align:right; font-weight:600; }
.leader-change.down { color: var(--red); text-align:right; font-weight:600; }

@media(max-width:1100px){
  .dashboard{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">CRYPTO WORLD</div>
  </div>
</header>

<main class="dashboard">
  <div></div>
  <div></div>

  <!-- RIGHT COLUMN -->
  <div class="column">
    <div class="card">
      <div class="card-title">Топ Гейнери (24г)</div>
      <div id="gainers-list" class="leaders-content">Завантаження...</div>
    </div>
    <div class="card">
      <div class="card-title">Топ Лузери (24г)</div>
      <div id="losers-list" class="leaders-content">Завантаження...</div>
    </div>
  </div>
</main>

<script>
const API_URL="http://127.0.0.1:5000";

/* PRICE FORMAT */
function formatPrice(p){
  return p>1000?p.toFixed(2):p>1?p.toFixed(4):p.toFixed(6);
}

/* EXCHANGE ICON */
function getExchangeIcon(exchange){
  if(exchange==="binance"){
    return `<img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" title="Binance">`;
  }
  if(exchange==="bybit"){
    return `<img src="https://seeklogo.com/images/B/bybit-logo-25B3F6A4D7-seeklogo.com.png" title="Bybit">`;
  }
  return "";
}

/* RENDER */
function renderLeaders(containerId, items){
  const el=document.getElementById(containerId);
  if(!items) return;

  el.innerHTML=items.map(i=>`
    <div class="leader-row">
      <div class="leader-symbol">
        ${getExchangeIcon(i.exchange)}
        ${i.symbol}
      </div>
      <div class="leader-price">$${formatPrice(i.price||0)}</div>
      <div class="leader-change ${i.change>=0?'up':'down'}">
        ${i.change>=0?'+':''}${i.change}%
      </div>
    </div>
  `).join('');
}

/* SSE */
function setupLeadersSSE(){
  const source=new EventSource(`${API_URL}/leaders_stream`);

  source.onmessage=e=>{
    const data=JSON.parse(e.data);
    renderLeaders('gainers-list',data.gainers);
    renderLeaders('losers-list',data.losers);
  };

  source.onerror=()=>{
    source.close();
    setTimeout(setupLeadersSSE,5000);
  };
}

window.onload=()=>{setupLeadersSSE();}
</script>

</body>
</html>
